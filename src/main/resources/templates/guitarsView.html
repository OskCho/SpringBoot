<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>VOD</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href="./"><h1>Pix</h1></a>
    <h2 th:text="${title}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Image</th>
            <th>Model name</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Stores</th>
        </tr>
        <tr th:each="g : ${guitars}">
            <td>
                <img th:src="${g.image}"/>
            </td>
            <td th:text="${g.modelName}"></td>
            <td>
                <a th:href="@{/guitars(BrandId=${g.brand.id})}"
                   th:text="${g.brand.name}"></a>
            </td>
            <td class="price" th:text="${g.price}"></td>
            <td class="search-container">
                <a class="search" th:href="@{/Stores(GuitarId=${g.id})}"></a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">
</div>
<footer>
    ${tip}
</footer>

</body>
</html>
